version: "3.9"

services:
  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    container_name: frontend
    ports:
      - "8501:8501"
    depends_on:
      - backend

  backend:
    build:
      context: ./Backend/API
      dockerfile: dockerfile
    container_name: backend
    ports:
      - "5000:5000"
